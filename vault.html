            ];


            // Clean names
            const games = gameFiles.map(file => {
                let name = file.replace(/\.html$/i, '');
                if (name.toLowerCase().startsWith('cl')) {
                    name = name.substring(2);
                }
                name = name.replace(/[_-]/g, ' ');
                name = name.replace(/\w\S*/g, txt => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase());
                return { file: file, name: name };
            }).sort((a, b) => a.name.localeCompare(b.name));

            // ---------- SECURE ACCESS CODE (PROTECTED FROM CONSOLE) ----------
            // The code is stored in a closure with no global reference
            let currentCode = (function() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%';
                let code = '';
                for (let i = 0; i < 8; i++) {
                    code += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return code;
            })();

            // Update code every 5 minutes - but keep it hidden in closure
            setInterval(() => {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%';
                let newCode = '';
                for (let i = 0; i < 8; i++) {
                    newCode += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                // Update the code in a way that's not exposed globally
                currentCode = newCode;
                
                // Also update the stored hash for verification (but we're doing direct comparison)
                console.log('Code updated (hidden)'); // This won't show the code
            }, 300000);

            // ---------- ANTI-CONSOLE TRICKS ----------

            /*
            Object.defineProperty(window, 'console', {
                value: console,
                writable: false,
                configurable: false
            });
            */

            // Clear console on load (optional)
            console.clear();
            console.log('%c🔒 Console is monitored', 'color: #ff7a00; font-size: 12px;');

            // ---------- ACCESS VERIFICATION (USING CLOSURE VARIABLE) ----------
            let favorites = JSON.parse(localStorage.getItem('vaultFavorites_v3')) || [];
            let currentGame = null;

            // DOM elements
            const accessOverlay = document.getElementById('accessOverlay');
            const codeInput = document.getElementById('codeInput');
            const verifyBtn = document.getElementById('verifyBtn');
            const errorMsg = document.getElementById('errorMsg');
            const searchBox = document.getElementById('searchBox');
            const gameGrid = document.getElementById('gameGrid');
            const gameCount = document.getElementById('gameCount');
            const gamesSection = document.getElementById('gamesSection');
            const playerOverlay = document.getElementById('playerOverlay');
            const gameIframe = document.getElementById('gameIframe');
            const currentGameNameSpan = document.getElementById('currentGameName');
            const favoriteBtn = document.getElementById('favoriteBtn');
            const backBtn = document.getElementById('backBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const favoritesList = document.getElementById('favoritesList');
            const favCount = document.getElementById('favCount');
            const chatToggleBtn = document.getElementById('chatToggleBtn');
            const chatSidebar = document.getElementById('chatSidebar');
            const chatFrame = document.getElementById('chatFrame');

            // Check if already verified
            if (!localStorage.getItem('vaultAccess_v3')) {
                accessOverlay.classList.remove('hidden');
            } else {
                accessOverlay.classList.add('hidden');
            }

            // Verify button - compares with the hidden currentCode
            verifyBtn.addEventListener('click', () => {
                // The code is accessed from the closure, not a global variable
                if (codeInput.value.trim() === currentCode) {
                    localStorage.setItem('vaultAccess_v3', 'true');
                    accessOverlay.classList.add('hidden');
                    errorMsg.style.display = 'none';
                } else {
                    errorMsg.style.display = 'block';
                }
            });

            // ---------- RENDER FUNCTIONS (same as before) ----------
            function renderGameGrid(filter = '') {
                const filtered = games.filter(g => g.name.toLowerCase().includes(filter.toLowerCase()));
                gameGrid.innerHTML = '';
                filtered.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.textContent = game.name;
                    card.onclick = () => playGame(game);
                    gameGrid.appendChild(card);
                });
                gameCount.textContent = `(${filtered.length})`;
            }

            function playGame(game) {
                currentGame = game;
                gameIframe.src = game.file;
                currentGameNameSpan.textContent = game.name;
                updateFavoriteStar();
                gamesSection.style.display = 'none';
                playerOverlay.style.display = 'flex';
            }

            function backToGrid() {
                gameIframe.src = 'about:blank';
                gamesSection.style.display = 'block';
                playerOverlay.style.display = 'none';
                currentGame = null;
            }

            function toggleFavorite() {
                if (!currentGame) return;
                const idx = favorites.indexOf(currentGame.file);
                if (idx === -1) {
                    favorites.push(currentGame.file);
                } else {
                    favorites.splice(idx, 1);
                }
                localStorage.setItem('vaultFavorites_v3', JSON.stringify(favorites));
                updateFavoriteStar();
                renderFavorites();
            }

            function updateFavoriteStar() {
                if (!currentGame) return;
                favoriteBtn.textContent = favorites.includes(currentGame.file) ? '★' : '☆';
            }

            function renderFavorites() {
                const favGames = games.filter(g => favorites.includes(g.file));
                favoritesList.innerHTML = '';
                favGames.forEach(game => {
                    const li = document.createElement('li');
                    li.textContent = game.name;
                    li.onclick = () => playGame(game);
                    favoritesList.appendChild(li);
                });
                favCount.textContent = favGames.length;
            }

            fullscreenBtn.addEventListener('click', () => {
                if (gameIframe.requestFullscreen) {
                    gameIframe.requestFullscreen();
                } else if (gameIframe.webkitRequestFullscreen) {
                    gameIframe.webkitRequestFullscreen();
                } else if (gameIframe.msRequestFullscreen) {
                    gameIframe.msRequestFullscreen();
                }
            });

            chatToggleBtn.addEventListener('click', () => {
                chatSidebar.classList.toggle('open');
                if (chatSidebar.classList.contains('open') && chatFrame.src === 'about:blank') {
                    chatFrame.src = 'https://widgetbot.io/embed/?server=1141811720422486159&channel=1141811720422486162';
                }
            });

            document.addEventListener('click', (e) => {
                if (!chatSidebar.contains(e.target) && !chatToggleBtn.contains(e.target) && chatSidebar.classList.contains('open')) {
                    chatSidebar.classList.remove('open');
                }
            });

            searchBox.addEventListener('input', (e) => renderGameGrid(e.target.value));
            backBtn.addEventListener('click', backToGrid);
            favoriteBtn.addEventListener('click', toggleFavorite);

            renderGameGrid();
            renderFavorites();
        })();
    </script>
